name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
      
jobs:
  preflight:
    name: Check Required Secrets & Variables
    runs-on: ubuntu-latest


    steps:
      - name: Show skip reason
        if: ${{ vars.DOCKER_HUB_USERNAME == '' }}
        run: |
          {
            echo "### Docker build skipped"
            echo ""
            echo "Docker Hub publishing is not configured."
            echo ""
            echo "To enable it, add:"
            echo "- Variable: \`DOCKER_HUB_USERNAME\`"
            echo "- Secret: \`DOCKER_HUB_ACCESS_TOKEN\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    name: Build and Push Docker Image
    needs: preflight
    if: ${{ vars.DOCKER_HUB_USERNAME != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Validate required credentials
        env:
          DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

        run: |
          if [ -z "$DOCKER_HUB_ACCESS_TOKEN" ]; then
            echo "::error::Repository secret DOCKER_HUB_ACCESS_TOKEN is missing."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare .env file
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKER_HUB_USERNAME }}/${{ vars.DOCKER_HUB_REPO_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max